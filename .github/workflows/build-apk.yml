name: Build Android APK (No EAS Required)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Check Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          ls $ANDROID_HOME/platforms/ || echo "No platforms found, installing..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed || true

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create environment file
        run: |
          echo "EXPO_PUBLIC_DOMAIN=localhost" > .env
          echo "EXPO_PUBLIC_REPL_ID=github-build" >> .env

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOTENV: 0
          CI: 1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: List built APKs
        run: find android/app/build/outputs -name "*.apk" -type f

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ai-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Summary
        run: |
          APK_SIZE=$(du -sh android/app/build/outputs/apk/debug/app-debug.apk 2>/dev/null | cut -f1 || echo "unknown")
          echo "## ✅ APK Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Debug (installable on any Android) |" >> $GITHUB_STEP_SUMMARY
          echo "| Download | Actions tab → Artifacts → nexus-ai-debug-apk |" >> $GITHUB_STEP_SUMMARY

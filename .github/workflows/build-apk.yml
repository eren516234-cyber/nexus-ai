name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare standalone package.json
        run: |
          if [ -f package.github.json ]; then
            cp package.github.json package.json
          fi

      - name: Install dependencies with npm
        run: npm install --legacy-peer-deps

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Create .env
        run: |
          echo "EXPO_PUBLIC_DOMAIN=localhost" > .env

      - name: Expo prebuild (generate Android project)
        run: npx expo prebuild --platform android --clean
        env:
          CI: 1

      - name: Disable New Architecture (fixes native linking issues)
        run: |
          echo "" >> android/gradle.properties
          echo "newArchEnabled=false" >> android/gradle.properties
          echo "hermesEnabled=true" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*') }}

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ai-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

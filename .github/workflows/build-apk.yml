name: Build Android APK (No EAS Required)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use resolved package.json (no catalog: entries)
        run: |
          if [ -f package.github.json ]; then
            cp package.github.json package.json
            echo "Using resolved package.json"
          fi

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create environment file
        run: |
          echo "EXPO_PUBLIC_DOMAIN=localhost" > .env
          echo "EXPO_PUBLIC_REPL_ID=github-build" >> .env

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        env:
          CI: 1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m" \
            -Dorg.gradle.daemon=false
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ai-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: Build Summary
        if: success()
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## ✅ Nexus AI APK Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|--|--|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Size** | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | Debug (installable on any Android) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Install** | Enable 'Unknown Sources' in Android Settings |" >> $GITHUB_STEP_SUMMARY
          echo "| **Download** | Actions tab → Artifacts → nexus-ai-debug-apk |" >> $GITHUB_STEP_SUMMARY
